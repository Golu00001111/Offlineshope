name: Android Build

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    # Step 1: Remove any potentially corrupt gradlew file
    - name: Clean up old wrapper
      run: rm -f gradlew

    # Step 2: Generate fresh wrapper files
    - name: Setup Gradle
      run: gradle wrapper --gradle-version 8.4

    # Step 3: Ensure execution permissions
    - name: Grant execute permission
      run: chmod +x gradlew

    # Step 4: Run build
    - name: Build with Gradle
      run: ./gradlew assembleDebug --info
